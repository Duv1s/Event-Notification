spring:
  application:
    name: event-notifications

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Native Spring Boot structured (JSON) console logging; MDC fields (trace_id, client_id, event_id)
# appear in each line. Never log PII (content, signature, secret, token).
logging:
  structured:
    format:
      console: ecs

# Application configuration. Every default is a DEMO value, overridden per environment.
# In production these come from environment variables / a secrets manager, never from this file.
app:
  security:
    jwt:
      # Demo defaults: the resource server verifies against a LOCAL JWKS (test public key on the
      # classpath). In production set OAUTH2_JWK_SET_URI to the IdP's JWKS endpoint (it takes
      # precedence) and OAUTH2_ISSUER / OAUTH2_AUDIENCE to the real values.
      issuer: ${OAUTH2_ISSUER:demo-issuer}
      audience: ${OAUTH2_AUDIENCE:event-notifications}
      jwks: ${OAUTH2_JWKS:classpath:jwt/demo-jwks.json}
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:}
  ratelimit:
    read-per-minute: ${RATELIMIT_READ_PER_MINUTE:100}
    replay-per-minute: ${RATELIMIT_REPLAY_PER_MINUTE:10}
  webhook:
    hmac-secret: ${WEBHOOK_HMAC_SECRET:demo-secret-not-for-production}
    connect-timeout: ${WEBHOOK_CONNECT_TIMEOUT:2s}
    read-timeout: ${WEBHOOK_READ_TIMEOUT:5s}
  seed:
    notifications: ${NOTIFICATIONS_SEED:classpath:notification_events.json}
    subscriptions: ${SUBSCRIPTIONS_SEED:classpath:subscriptions.json}